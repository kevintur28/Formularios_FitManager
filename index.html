<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitManager - Formularios</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2b4eff;
      color: white;
      text-align: center;
      padding: 20px;
    }
    section {
      max-width: 750px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      color: #2b4eff;
      text-align: center;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-top: 10px;
      font-weight: bold;
    }
    input, select {
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .botones {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      width: 30%;
    }
    .guardar { background: #2ecc71; }
    .editar { background: #3498db; }
    .eliminar { background: #e74c3c; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>FitManager - Formularios del Sistema</h1>
</header>

<section>
  <h2>Usuarios</h2>
  <form>
    <label>Nombre:</label>
    <input type="text" name="nombre" required>

    <label>Apellido:</label>
    <input type="text" name="apellido" required>

    <label>Documento:</label>
    <input type="text" name="documento" required>

    <label>Tipo de Documento:</label>
    <select name="tipo_documento" required>
      <option value="">Seleccione una opción</option>
      <option value="TI">Tarjeta de Identidad (T.I)</option>
      <option value="CC">Cédula de Ciudadanía (C.C)</option>
    </select>

    <label>Email:</label>
    <input type="email" name="email" required>

    <label>Rol:</label>
    <select name="rol" required>
      <option value="">Seleccione un rol</option>
      <option value="entrenador">Entrenador</option>
      <option value="cliente">Cliente</option>
    </select>

    <div class="botones">
      <button class="guardar" formaction="guardar_usuario.php" type="submit">Guardar</button>
      <button class="editar" formaction="editar_usuario.php" type="submit">Editar</button>
      <button class="eliminar" formaction="eliminar_usuario.php" type="submit">Eliminar</button>
    </div>
  </form>
</section>

<section>
  <h2>Evaluaciones Físicas</h2>
  <form>
    <label>Fecha:</label>
    <input type="date" name="fecha" required>

    <label>Peso (kg):</label>
    <input type="number" name="peso" step="0.1" required>

    <label>Edad:</label>
    <input type="number" name="edad" required>

    <label>Condición:</label>
    <select name="condicion">
      <option value="">Seleccione una condición</option>
      <option value="excelente">Excelente</option>
      <option value="buena">Buena</option>
      <option value="regular">Regular</option>
      <option value="mala">Mala</option>
    </select>

    <label>Pruebas Realizadas:</label>
    <input type="text" name="pruebas">

    <label>Usuario:</label>
    <select name="usuario">
      <option value="">Seleccione un usuario</option>
      <option value="1">Juan Pérez</option>
      <option value="2">María Gómez</option>
      <option value="3">Carlos Ruiz</option>
    </select>

    <div class="botones">
      <button class="guardar" formaction="guardar_evaluacion.php" type="submit">Guardar</button>
      <button class="editar" formaction="editar_evaluacion.php" type="submit">Editar</button>
      <button class="eliminar" formaction="eliminar_evaluacion.php" type="submit">Eliminar</button>
    </div>
  </form>
</section>

      <option value="efectivo">Efectivo</option>

      <option value="">Seleccione una membresía</option>
      <option value="mensual">Mensual</option>
      <option value="trimestral">Trimestral</option>
      <option value="anual">Anual</option>
    </select>

    <label>Precio:</label>
    <input type="number" name="precio" step="0.01" required>

    <label>Duración (meses):</label>
    <input type="number" name="duracion_meses" required>

    <div class="botones">
      <button class="guardar" formaction="guardar_membresia.php" type="submit">Guardar</button>
      <button class="editar" formaction="editar_membresia.php" type="submit">Editar</button>
      <button class="eliminar" formaction="eliminar_membresia.php" type="submit">Eliminar</button>

      <option value="transferencia">Transferencia</option>

    <div class="botones">
      <button class="guardar" formaction="guardar_metodopago.php" type="submit">Guardar</button>
      <button class="editar" formaction="editar_metodopago.php" type="submit">Editar</button>
      <button class="eliminar" formaction="eliminar_metodopago.php" type="submit">Eliminar</button>

  </form>

    <select name="descripcion" required>
      <option value="">Seleccione un rol</option>

    </select>

    <div class="botones">
